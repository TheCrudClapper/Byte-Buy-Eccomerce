<div class="container">
    <div class="row  my-5">
        <!-- Cart Items List -->
        <div class="col-8">
            <div class="content-section text-center">
                <div class="row">
                    <div class="col-6">
                        <p class="my-0">Product</p>
                    </div>
                    <div class="col-2">
                        <p class="m-0">Price</p>
                    </div>
                    <div class="col-2">
                        <p class="m-0">Quantity</p>
                    </div>
                    <div class="col-2">
                        <p class="m-0">Subtotal</p>
                    </div>
                </div>
            </div>

            @for(item of cartItems; track item.id){
            <app-cart-item [item]="item"></app-cart-item>
            }
        </div>

        <div class="col-4">
            <!-- Summary Container -->
            <div class="content-section">
                <p class="content-section-title mb-3">Summary</p>
                <hr>
                <div class="mb-2 d-flex justify-content-between">
                    <span class="summary-item">Items</span>
                    <span class="summary-value">8 pcs</span>
                </div>
                <div class="mb-2 d-flex justify-content-between">
                    <span class="summary-item">Shipping from</span>
                    <span class="summary-value">67,67 PLN</span>
                </div>
                <div class="mb-2 d-flex justify-content-between">
                    <span class="summary-item">Tax</span>
                    <span class="summary-value">67,67 PLN</span>
                </div>
                <hr>
                <div class="mb-3 d-flex justify-content-between ">
                    <p class="content-section-title fw-bold">Total Cost</p>
                    <p class="total-cost" style="font-size: 16px;">267,67 PLN</p>
                </div>
                <button class="btn w-100">Checkout</button>
            </div>
        </div>

    </div>
</div>
