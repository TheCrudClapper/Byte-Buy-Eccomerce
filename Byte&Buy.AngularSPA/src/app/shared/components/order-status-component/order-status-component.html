@if(orderStatusModel){
<i [class]="orderStatusModel.iconClass" class="me-2" style="color: #ffffff;"></i>
<span class="content-title open-sans-bold"
    [innerText]="orderStatusModel.statusText"></span>
    @if(dateDelivered && dateDelivered != null){
    <span class="fs-12-px">
        {{ orderStatusModel.dateDelivered| date:'dd MMM yyyy, HH:mm' }}
    </span>
    }
}
