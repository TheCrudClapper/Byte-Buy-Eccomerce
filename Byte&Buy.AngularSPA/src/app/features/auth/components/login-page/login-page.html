<div class="container">

    <div class="row d-flex justify-content-center">

        <div class="col-md-9 col-lg-7 col-xl-6 col-xxl-5  login-window">
            <!--Brand-->
            <div class="mb-5 d-flex justify-content-center brand-section align-items-center">
                <i class="fa-solid fa-laptop-code fa-4x"></i>
                <h1 class="fw-bold">Byte&Buy</h1>
            </div>

            <!--Login Form-->
            <form [formGroup]="loginForm" (submit)="onSubmit()">
                <div class="mb-3">
                    <label for="inputEmail" class="form-label">Email</label>
                    <input type="email" class="form-control" formControlName="email" id="inputEmail">
                    @if(getErrorMessage('email')){
                        <span class="validation-error"> {{ getErrorMessage('email') }}</span>
                    }
                </div>
                <div class="mb-3">
                    <label for="inputPassword" class="form-label">Password</label>
                    <input type="password" class="form-control" formControlName="password" id="inputPassword">
                    @if(getErrorMessage('password')){
                        <span class="validation-error"> {{ getErrorMessage('password') }}</span>
                    }
                </div>

                <!--Form Check and Passwords Forgot Link-->
                <div class="mb-3 d-flex justify-content-between">
                    <div class="form-check">
                        <input type="checkbox" class="form-check-input checkbox" id="exampleCheck1">
                        <label class="form-check-label" for="exampleCheck1">Remember me</label>
                    </div>
                    <div>
                        <a href="#" class="text-normal-size">
                            Forgot Password ?
                        </a>
                    </div>
                </div>

                <span class="validation-error">{{ errorMessage() }}</span>
               
                
                <!--Log in Button-->
                <div class="mb-3">
                    <button type="submit" class="btn w-100" [disabled]="loading()">Log in</button>
                </div>

                <!--Separator-->
                <div class="mb-3">
                    <div class="separator">
                        <span>Or continue with</span>
                    </div>
                </div>

                <!--Other Loggin in Metods-->
                <div class="mb-3 d-flex justify-content-between">
                    <button type="submit" class="btn w-100 disabled me-1">
                        <i class="fa-brands fa-facebook me-1"></i>
                        <span>Facebook</span>
                    </button>
                    <button type="submit" class="btn w-100 disabled ms-1">
                        <i class="fa-brands fa-google me-1"></i>
                        <span>Google</span>
                    </button>
                </div>

                <div class="mb-3">
                    <button type="submit" class="btn w-100 disabled">
                        <i class="fa-brands fa-github me-1"></i>
                        <span>Log in using GitHub</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
