<div class="container">
    <div class="row row mt-3">
        <div class="col-12">
            <p class="page-title">You are searching for: "gówno"</p>
        </div>
    </div>
    <div class="row">
        <div class="col-12 col-lg-3">
            <div class="content-section p-4">

                <!-- Category Filters -->
                <p class="filter-section-title">Categories</p>
                <hr>
                <div class="mb-4">
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">Personal Computer</label>
                    </div>
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">Central Processing Unit</label>
                    </div>
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">Graphical Processing Unit</label>
                    </div>
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">FAN</label>
                    </div>
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">Phone</label>
                    </div>
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">Case</label>
                    </div>
                    <div class="mb-1">
                        <input type="checkbox" class="form-check-input checkbox me-2" />
                        <label class="form-label">Power Supply Unit</label>
                    </div>
                </div>

                <p class="filter-section-title mt-5">Product Conditions</p>
                <hr>
                <div class="mb-1">
                    <input type="checkbox" class="form-check-input checkbox me-2" />
                    <label class="form-label">New</label>
                </div>
                <div class="mb-1">
                    <input type="checkbox" class="form-check-input checkbox me-2" />
                    <label class="form-label">Used</label>
                </div>
                <div class="mb-1">
                    <input type="checkbox" class="form-check-input checkbox me-2" />
                    <label class="form-label">Very Good</label>
                </div>

                <!-- General Filters -->
                <p class="filter-section-title mt-5">Filters</p>
                <hr class="mb-2">
                <div class="mb-4">
                    <label class="form-label">Offer Type</label>
                    <div class="mb-1 d-flex justify-content-between align-items-center">
                        <span>
                            <input type="checkbox" class="form-check-input checkbox me-2" />
                            <label class="form-label m-0">Rent</label>
                        </span>
                        <span class="badge">570</span>
                    </div>
                    <div class="mb-1 d-flex justify-content-between align-items-center">
                        <span>
                            <input type="checkbox" class="form-check-input checkbox me-2" />
                            <label class="form-label m-0">Sale</label>
                        </span>
                        <span class="badge">683</span>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Seller</label>
                    <div class="mb-1">
                        <span>
                            <input type="checkbox" class="form-check-input checkbox me-2" />
                            <label class="form-label m-0">Company</label>
                        </span>
                    </div>
                    <div class="mb-1">
                        <span>
                            <input type="checkbox" class="form-check-input checkbox me-2" />
                            <label class="form-label m-0">Private</label>
                        </span>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Location</label>
                    <input type="text" class="form-control" placeholder="Enter City, Place etc.">
                </div>
                <div class="mb-4">
                    <label class="form-label">Price</label>
                    <div class="row">
                        <div class="col-6">
                            <input type="number" class="form-control" placeholder="From">
                        </div>
                        <div class="col-6">
                            <input type="number" class="form-control" placeholder="To">
                        </div>
                    </div>
                </div>
                <div class="mb-4">
                    <label class="form-label">Max Rental Days</label>
                    <div class="row">
                        <div class="col-6">
                            <input type="number" class="form-control" placeholder="From">
                        </div>
                        <div class="col-6">
                            <input type="number" class="form-control" placeholder="To">
                        </div>
                    </div>
                </div>

                <p class="filter-section-title mt-5">Actions</p>
                <hr>
                <div class="mb-4">
                    <button class="btn w-100 mb-2">Apply Filtering</button>
                    <button class="btn w-100">Clear Filters</button>
                </div>
            </div>
        </div>


        <!-- Sorting and Offer Section -->
        <div class="col-12 col-lg-9">
            <span class="fw-bold">Offer Listings</span>
            <span> - 10 found</span>
            <div class="content-section mt-1 mb-4">
                <div class="row">
                    <div class="col-6 d-flex align-items-center gap-2">
                        <span class="fw-bold">Sort by:</span>
                        <select class="form-select form-select-sm w-auto">
                            <option value="1">Newest</option>
                            <option value="2">Oldest</option>
                            <option value="3">Cheapest</option>
                            <option value="3">More expensive</option>
                        </select>
                    </div>
                    <div class="col-6 d-flex align-items-center justify-content-end gap-2">
                        <button class="page-button">
                            <i class="fa-solid fa-chevron-left"></i>
                        </button>

                        <div class="pagination d-flex align-items-center gap-1">
                            <input type="number" class="form-control form-control-sm page-input page-input-narrow" />
                            <span>from</span>
                            <span>600</span>
                        </div>

                        <button class="page-button">
                            <i class="fa-solid fa-chevron-right"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Offer Section -->
            @if(offers().length !== 0){
            @for (item of offers(); track $index)
            {
                @if(item.type === 'rent'){
                    <app-rent-browser-item [offer]="item">
                    </app-rent-browser-item>
                }

                @if(item.type === 'sale'){
                    <app-sale-browser-item [offer]="item">
                    </app-sale-browser-item>
                }
                }
            }
            
        </div>
    </div>
</div>
