<div class="container h-100">
    <div class="page-wrapper mt-5 mb-5 ">
        <div class="row">
            <div class="col-12">
                <p class="page-title">Client Rentals</p>
            </div>
        </div>
        <div class="content-section  d-flex justify-content-between align-items-center">
            <div class="">
                <input type="text" placeholder="Search phrase" class="form-control" id="searchField" />
            </div>
            <a class="link">FILTERS</a>
        </div>
        <div class="content-section">
            <div class="d-flex d-align-items-center justify-content-between">
                <p class="my-0 content-section-title">
                    <i class="fa-solid fa-square-plus" style="color: #ffffff;"></i>
                    Rental Created
                <p class="my-0 content-section-title">
                    Created (04 Feb 2026, 15:53)
                </p>
            </div>
            <hr>
            <div class="col-12 mb-3">
                <div class="d-flex flex-column">
                    <span>
                        <span class="fs-14-px">Lended for </span>
                        <span class="open-sans-bold fs-14-px">Joanna Jarzmik (joannajarzmik@gmail.com)</span>
                    </span>
                    <span>
                    </span>
                    <div class="d-flex justify-content-between">
                        <span class="fs-14-px">
                            Lended from
                            <span class="open-sans-bold">05 Feb 2026</span>
                            to
                            <span class="open-sans-bold">10 Feb 2026</span>
                        </span>
                        <span class="fs-14-px open-sans-bold">(5 day/s period)</span>
                    </div>
                </div>
            </div>
            <div class="card mb-3">
                <div class="card-body">
                    <div class="row g-3 align-items-center">
                        <div class="col-auto">
                            <img src="fallback.png" class="img-fluid rounded" [alt]="``"
                                style="width: 80px; height: 80px; object-fit: cover;">
                        </div>
                        <div class="col">
                            <div class="row">
                                <div class="col">
                                    <h6 class="mb-1 fw-bold fs-14-px">
                                        Komputer Pc
                                    </h6>
                                </div>
                            </div>
                            <div class="row align-items-center">
                                <div class="col-auto fs-14-px">
                                    <span>Lended <span class="open-sans-bold">15 </span>units</span>
                                </div>
                            </div>

                        </div>
                    </div>
                </div>
            </div>
            <hr>
            <div class="col-12 d-flex justify-content-between">
                <span class="fs-14-px open-sans-bold">Paid</span>
                <span class="fs-14-px open-sans-bold">
                    150 PLN
                </span>
            </div>
            <hr>
            <div class="col-12 text-center">
                <span class="link"></span>
            </div>
        </div>
    </div>
</div>
