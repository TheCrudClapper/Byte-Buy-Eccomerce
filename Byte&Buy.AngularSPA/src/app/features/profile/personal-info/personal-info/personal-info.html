<div class="content-section">
    <span class="page-title">Personal Information</span>
</div>
<div class="content-section">
    <form>
        <div class="row mb-3">
            <div class="col-6">
                <p class="content-section-title mb-1">First Name*</p>
                <input type="text" class="form-control">
            </div>
            <div class="col-6">
                <p class="content-section-title mb-1">Last Name*</p>
                <input type="text" class="form-control">
            </div>
        </div>
        <div class="row mb-3">
            <div class="col-6">
                <p class="content-section-title mb-1">Email*</p>
                <input type="email" class="form-control">
            </div>

                <p class="content-section-title mb-1">Phone*</p>
                <input type="text" class="form-control">
            </div>
        </div>

            <div class="col-12 text-end">

        </div>

    </form>

<div class="content-section">
    <form>
        <div class="row mb-3">
            <div class="col-6">
                <p class="content-section-title mb-1">Current Password*</p>
                <input type="text" class="form-control">
            </div>
            <div class="col-6">
                <p class="content-section-title mb-1">New Password*</p>
                <input type="text" class="form-control">
            </div>
        </div>
        <div class="row mb-3 align-items-end">
            <div class="col-6">
                <p class="content-section-title mb-1">Confirm Password*</p>
                <input type="email" class="form-control">
            </div>
            <div class="col-6 text-end align-bottom">
                <button class="btn me-2" type="reset">Reset</button>
                <button class="btn" type="submit">Change Password</button>
